<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>蜘蛛侠 · Modern Buildings City</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0e13}
  canvas{display:block}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#9fb4cc;font:15px system-ui;background:#0b0e13;z-index:20;transition:opacity .4s}
  button{background:#2a3546;color:#dfe8f2;border:0;border-radius:6px;padding:4px 10px;margin:2px 4px 2px 0;font:12px system-ui;cursor:pointer}
  button:hover{background:#3a4a63}
  /* fixed gray crosshair — never changes color, it's just the muzzle */
  #crosshair{position:fixed;left:50%;top:50%;width:14px;height:14px;margin:-7px 0 0 -7px;pointer-events:none;z-index:15;opacity:.75}
  #crosshair::before,#crosshair::after{content:'';position:absolute;background:#c7cdd6}
  #crosshair::before{left:6px;top:0;width:2px;height:14px}
  #crosshair::after{left:0;top:6px;width:14px;height:2px}
  #lockHint{position:fixed;left:50%;bottom:12%;transform:translateX(-50%);color:#e8edf4;background:rgba(12,14,18,.72);padding:10px 18px;border-radius:10px;font:14px system-ui;z-index:16;backdrop-filter:blur(6px)}
  #lockHint.hidden{display:none}
  #scorePill{position:fixed;left:50%;top:14px;transform:translateX(-50%);color:#ffe9ec;background:rgba(30,10,14,.72);border:1px solid rgba(255,80,90,.45);padding:7px 18px;border-radius:20px;font:600 15px system-ui;z-index:16;backdrop-filter:blur(6px)}
  #scorePill.pop{animation:pillPop .45s ease}
  @keyframes pillPop{30%{transform:translateX(-50%) scale(1.25)}}
  #winBanner{position:fixed;left:50%;top:34%;transform:translate(-50%,-50%);color:#fff;background:rgba(30,10,14,.86);border:1px solid rgba(255,80,90,.6);padding:22px 34px;border-radius:16px;font:15px/1.9 system-ui;text-align:center;z-index:18;backdrop-filter:blur(8px)}
  #winBanner b{font-size:22px;color:#ff8f9a}
  #winBanner.hidden{display:none}
</style>
<script type="importmap">
{"imports":{"three":"../shared/vendor/three.module.js","three/addons/":"../shared/vendor/jsm/"}}
</script>
</head>
<body>
<div id="loading">加载城市场景…</div>
<div id="crosshair"></div>
<div id="lockHint">点击画面进入操控（Esc 释放鼠标）</div>
<script type="module" src="./main.js"></script>
</body>
</html>
